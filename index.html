<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JAILEX | Connect</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap">
    <style>
        body { background: #060e1a; color: white; font-family: 'Orbitron'; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-btn { 
            background: #53FC18; color: black; padding: 20px 40px; border: none; border-radius: 12px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(83, 252, 24, 0.4); transition: 0.3s;
        }
        .login-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px #53FC18; }
    </style>
</head>
<body>
    <h1 style="color: #00d2ff; text-shadow: 0 0 10px #00d2ff;">JAILEX ENGINE</h1>
    <p style="font-family: sans-serif; opacity: 0.6; margin-bottom: 30px;">GRANT CHAT PERMISSIONS</p>
    
    <button class="login-btn" onclick="startLogin()">Connect to Kick</button>

    <script>
        function startLogin() {
            // !!! REPLACE THIS WITH YOUR CLIENT ID FROM KICK DEV PORTAL !!!
            const CLIENT_ID = "YOUR_KICK_CLIENT_ID_HERE"; 
            const REDIRECT = "https://kick-jade-nu.vercel.app/api/callback";
            const SCOPES = "user:read channel:read chat:write";
            
            const authUrl = `https://id.kick.com/oauth/authorize`;
            const params = new URLSearchParams({
                client_id: CLIENT_ID,
                redirect_uri: REDIRECT,
                response_type: 'code',
                scope: SCOPES,
                state: Math.random().toString(36).substring(7)
            });

            window.location.href = `${authUrl}?${params.toString()}`;
        }
    </script>
</body>
</html>
