<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kick Tracker</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap">
    <style>
        body { 
            background-color: #060e1a; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Orbitron', sans-serif; 
        }
        h2 { color: #53FC18; letter-spacing: 3px; font-size: 24px; margin-bottom: 5px; }
        .follower-count { font-size: 80px; text-shadow: 0 0 20px #53FC18; margin: 0; }
        .error-log { color: #ff3333; font-family: monospace; font-size: 14px; margin-top: 20px; text-align: center; max-width: 80%; }
    </style>
</head>
<body>

    <h2>KICK FOLLOWERS</h2>
    <div id="count" class="follower-count">SYNCING...</div>
    <div id="log" class="error-log"></div>

    <script>
        const USERNAME = 'justquitbro7';
        // We use a free proxy called 'corsproxy.io' to trick the browser into allowing the connection
        const TARGET_URL = encodeURIComponent(`https://kick.com/api/v2/channels/${USERNAME}`);
        const PROXY_URL = `https://corsproxy.io/?${TARGET_URL}`;

        async function getFollowers() {
            try {
                const response = await fetch(PROXY_URL, {
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) {
                    throw new Error(`Kick Security Blocked the Request (Code: ${response.status})`);
                }

                const data = await response.json();
                
                if(data.followersCount !== undefined) {
                    document.getElementById('count').innerText = data.followersCount;
                } else {
                    document.getElementById('count').innerText = "HIDDEN";
                    document.getElementById('log').innerText = "Data arrived, but Kick hid the follower count.";
                }

            } catch (error) {
                document.getElementById('count').innerText = "ERROR";
                document.getElementById('log').innerText = error.message + "\n\n(Cloudflare is still blocking the connection)";
            }
        }

        // Run the engine
        getFollowers();
    </script>

</body>
</html>
