<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JAILEX | Chat Live</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap">
    <style>
        body { 
            background: #060e1a; color: #53FC18; font-family: 'Orbitron', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;
        }
        #monitor { 
            width: 80%; max-width: 500px; padding: 20px; border: 2px solid #00d2ff; 
            border-radius: 15px; box-shadow: 0 0 20px #00d2ff; background: rgba(0,0,0,0.5);
        }
        .msg { border-bottom: 1px solid #333; padding: 10px 0; font-family: sans-serif; color: white; }
        .user { color: #53FC18; font-weight: bold; font-family: 'Orbitron'; font-size: 12px; }
        .status { font-size: 10px; color: #00d2ff; margin-bottom: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="status">System Status: <span id="sync-state">Searching for Messages...</span></div>
    
    <div id="monitor">
        <div id="chat-content">Waiting for you to type in Kick chat...</div>
    </div>

    <script>
        async function updateChat() {
            try {
                const res = await fetch('/api/readChat');
                const data = await res.json();
                
                if (data.latest_messages && data.latest_messages.length > 0) {
                    document.getElementById('sync-state').innerText = "ONLINE";
                    let html = '';
                    data.latest_messages.forEach(m => {
                        html += `<div class="msg"><span class="user">${m.user}:</span><br>${m.text}</div>`;
                    });
                    document.getElementById('chat-content').innerHTML = html;
                }
            } catch (e) {
                document.getElementById('sync-state').innerText = "RECONNECTING...";
            }
        }

        // Checks for new messages every 2 seconds automatically
        setInterval(updateChat, 2000);
    </script>
</body>
</html>
